<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5b342"/>
      <stop offset="100%" stop-color="#d4923a"/>
    </linearGradient>
    <linearGradient id="ray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5b342" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5b342" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background notebook paper -->
  <rect width="512" height="512" fill="url(#bg)" rx="64"/>

  <!-- Ruled lines -->
  <g opacity="0.08">
    <line x1="64" y1="80" x2="480" y2="80" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="112" x2="480" y2="112" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="144" x2="480" y2="144" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="176" x2="480" y2="176" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="208" x2="480" y2="208" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="240" x2="480" y2="240" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="272" x2="480" y2="272" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="304" x2="480" y2="304" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="336" x2="480" y2="336" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="368" x2="480" y2="368" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="400" x2="480" y2="400" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="432" x2="480" y2="432" stroke="#8b7355" stroke-width="0.5"/>
    <line x1="64" y1="464" x2="480" y2="464" stroke="#8b7355" stroke-width="0.5"/>
  </g>

  <!-- Red margin line -->
  <line x1="72" y1="48" x2="72" y2="480" stroke="#c0392b" stroke-width="2" opacity="0.15"/>

  <!-- Sun rays -->
  <g transform="translate(256, 200)" opacity="0.15">
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(0)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(30)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(60)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(90)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(120)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(150)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(180)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(210)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(240)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(270)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(300)"/>
    <polygon points="0,-120 4,-24 -4,-24" fill="#d4923a" transform="rotate(330)"/>
  </g>

  <!-- Sun circle -->
  <circle cx="256" cy="200" r="56" fill="url(#sun)" opacity="0.9"/>

  <!-- Inner glow -->
  <circle cx="256" cy="200" r="40" fill="#fce4b8" opacity="0.4"/>

  <!-- OM symbol (simplified Devanagari ॐ) -->
  <g transform="translate(256, 340)">
    <!-- ॐ stylized -->
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="serif" font-size="120" fill="#4a3728" opacity="0.35"
          font-weight="bold">ॐ</text>
  </g>

  <!-- Gayatri text -->
  <g transform="translate(256, 460)">
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="serif" font-size="16" fill="#8b7355" opacity="0.5"
          letter-spacing="4">GAYATRI TIME</text>
  </g>

  <!-- Subtle horizontal rule -->
  <line x1="128" y1="420" x2="384" y2="420" stroke="#8b7355" stroke-width="0.5" opacity="0.15"/>
</svg>
